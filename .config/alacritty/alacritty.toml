
[colors]
draw_bold_text_with_bright_colors = true

[colors.primary]
background = "#1D2021"
foreground = "#ebdbb2"

[colors.normal]
black   = "#282828"
red     = "#cc241d"
green   = "#98971a"
yellow  = "#d79921"
blue    = "#458588"
magenta = "#b16286"
cyan    = "#689d6a"
white   = "#a89984"

[colors.bright]
black   = "#928374"
red     = "#fb4934"
green   = "#b8bb26"
yellow  = "#fabd2f"
blue    = "#83a598"
magenta = "#d3869b"
cyan    = "#8ec07c"
white   = "#ebdbb2"

[cursor]
style = "Block"
unfocused_hollow = true

[font]
size = 10.0

[font.normal]
family = "FiraCode Nerd Font Mono"
style = "Regular"

[font.bold]
family = "FiraCode Nerd Font Mono"
style = "Bold"

[font.italic]
family = "FiraCode Nerd Font Mono"
style = "Italic"

[font.glyph_offset]
x = 0
y = 0

[font.offset]
x = 0
y = 0

[keyboard]
bindings = [
  { key = "V", mods = "Control|Shift", action = "Paste" },
  { key = "C", mods = "Control|Shift", action = "Copy" }
]

[mouse]
hide_when_typing = true

[[mouse.bindings]]
mouse = "Right"
action = "Copy"

[[mouse.bindings]]
mouse = "Right"
mods = "Control"
action = "Paste"

[[mouse.bindings]]
mouse = "Middle"
action = "Paste"

[[mouse.bindings]]
mouse = "Middle"
mods = "Control"
action = "PasteSelection"

[scrolling]
history = 10000

[window]
decorations = "none"
dynamic_padding = true
opacity = 0.93
startup_mode = "Windowed"

[window.dimensions]
columns = 120
lines = 32

[window.padding]
x = 0
y = 0

[[hints.enabled]]
regex = '(magnet:|mailto:|gemini:|gopher:|https:|http:|news:|file:|git:|ssh:|ftp:)[^\u0000-\u001F\u007F-\u009F<>"\\s{-}\\^⟨⟩`]+'

# what to do with the matched text; {} is replaced by the URL
command = "xdg-open {}"

# tidy up the match (e.g. strip trailing punctuation)
post_processing = true

# keyboard binding: Ctrl+Enter
binding = { key = "Return", mods = "Control" }

# mouse binding: Ctrl+hover underline & click
mouse   = { mods = "Control", enabled = true }

[general]
live_config_reload = true
