live_config_reload = true
[colors]
draw_bold_text_with_bright_colors = true

[colors.primary]
background = "#1D2021"
foreground = "#ebdbb2"

[colors.normal]
black   = "#282828"
red     = "#cc241d"
green   = "#98971a"
yellow  = "#d79921"
blue    = "#458588"
magenta = "#b16286"
cyan    = "#689d6a"
white   = "#a89984"

[colors.bright]
black   = "#928374"
red     = "#fb4934"
green   = "#b8bb26"
yellow  = "#fabd2f"
blue    = "#83a598"
magenta = "#d3869b"
cyan    = "#8ec07c"
white   = "#ebdbb2"

[terminal]
osc52 = "CopyPaste"  # enables OSC 52 clipboard we just set up

[cursor]
style = { shape = "Block", blinking = "On" }
blink_interval = 750
blink_timeout = 10
unfocused_hollow = true

[font]
size = 10.0
builtin_box_drawing = true  # uses FiraCode's box drawing chars for tmux borders

[font.normal]
family = "FiraCode Nerd Font Mono"
style = "Regular"

[font.bold]
family = "FiraCode Nerd Font Mono"
style = "Bold"

[font.italic]
family = "FiraCode Nerd Font Mono"
style = "Italic"

[font.glyph_offset]
x = 0
y = 0

[font.offset]
x = 0
y = 0

[keyboard]
bindings = [
   	{ key = "V", mods = "Control|Shift", action = "Paste" },
   	{ key = "C", mods = "Control|Shift", action = "Copy" },
  	{ key = "Return", mods = "Alt", action = "ToggleFullscreen" },
  	{ key = "N", mods = "Control|Shift", action = "SpawnNewInstance" },
 ]

[mouse]
hide_when_typing = true

[[mouse.bindings]]
mouse = "Right"
action = "Copy"

[[mouse.bindings]]
mouse = "Right"
mods = "Control"
action = "Paste"

[[mouse.bindings]]
mouse = "Middle"
action = "Paste"

[[mouse.bindings]]
mouse = "Middle"
mods = "Control"
action = "PasteSelection"

[scrolling]
history = 10000
multiplier = 5  # lines scrolled per scroll event, default is 3

[window]
decorations = "none"
dynamic_padding = true
opacity = 0.93
startup_mode = "Windowed"
title = "Alacritty"
dynamic_title = true

[window.dimensions]
columns = 120
lines = 32

[window.padding]
x = 0
y = 0

[[hints.enabled]]
regex = '(magnet:|mailto:|gemini:|gopher:|https:|http:|news:|file:|git:|ssh:|ftp:)[^\u0000-\u001F\u007F-\u009F<>"\\s{-}\\^⟨⟩`]+'

command = "xdg-open {}"

post_processing = true

# mouse binding: Ctrl+hover underline & click
mouse   = { mods = "Control", enabled = true }

